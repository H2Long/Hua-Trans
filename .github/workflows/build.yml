name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ── Linux build ──────────────────────────────────────────────────────
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-wqy-microhei

      - name: Install Python deps
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller main.py \
            --name=hua-trans-linux \
            --onefile \
            --windowed \
            --add-data=core:core \
            --add-data=gui:gui \
            --add-data=resources:resources \
            --hidden-import=PyQt5 \
            --hidden-import=PyQt5.QtWidgets \
            --hidden-import=PyQt5.QtCore \
            --hidden-import=PyQt5.QtGui \
            --hidden-import=PyQt5.QtSvg \
            --hidden-import=fitz \
            --hidden-import=Xlib \
            --hidden-import=pyperclip \
            --hidden-import=PIL \
            --hidden-import=requests \
            --hidden-import=keyring \
            --noconfirm --clean

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: hua-trans-linux
          path: dist/hua-trans-linux

  # ── Windows build ────────────────────────────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python deps
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller main.py `
            --name=hua-trans-windows `
            --onefile `
            --windowed `
            --add-data="core;core" `
            --add-data="gui;gui" `
            --add-data="resources;resources" `
            --hidden-import=PyQt5 `
            --hidden-import=PyQt5.QtWidgets `
            --hidden-import=PyQt5.QtCore `
            --hidden-import=PyQt5.QtGui `
            --hidden-import=PyQt5.QtSvg `
            --hidden-import=fitz `
            --hidden-import=pynput `
            --hidden-import=pyperclip `
            --hidden-import=PIL `
            --hidden-import=requests `
            --hidden-import=keyring `
            --noconfirm --clean

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: hua-trans-windows
          path: dist/hua-trans-windows.exe

  # ── GitHub Release (on tag only) ─────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: hua-trans-linux
      - uses: actions/download-artifact@v4
        with:
          name: hua-trans-windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hua-trans-linux
            hua-trans-windows.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
