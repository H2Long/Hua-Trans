name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ── Linux AppImage build ──────────────────────────────────────────────
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-wqy-microhei libfuse2

      - name: Install Python deps
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller main.py \
            --name=hua-trans \
            --onefile \
            --windowed \
            --add-data=core:core \
            --add-data=gui:gui \
            --add-data=resources:resources \
            --hidden-import=PyQt5 \
            --hidden-import=PyQt5.QtWidgets \
            --hidden-import=PyQt5.QtCore \
            --hidden-import=PyQt5.QtGui \
            --hidden-import=PyQt5.QtSvg \
            --hidden-import=fitz \
            --hidden-import=Xlib \
            --hidden-import=pyperclip \
            --hidden-import=PIL \
            --hidden-import=requests \
            --hidden-import=keyring \
            --noconfirm --clean

      - name: Package as AppImage
        run: |
          # Create AppDir structure
          APPDIR=AppDir
          mkdir -p $APPDIR/usr/bin
          cp dist/hua-trans $APPDIR/usr/bin/

          # Desktop entry
          cat > $APPDIR/hua-trans.desktop << 'DESKTOPEOF'
          [Desktop Entry]
          Name=黄花梨之译
          Name[en]=Hua-Trans
          Comment=电子工程数据手册 PDF 翻译工具
          Comment[en]=EE Datasheet PDF Translation Tool
          Exec=hua-trans
          Icon=hua-trans
          Terminal=false
          Type=Application
          Categories=Development;Education;Engineering;
          DESKTOPEOF

          # Icon
          cp resources/icon.png $APPDIR/hua-trans.png 2>/dev/null || true

          # AppRun launcher
          cat > $APPDIR/AppRun << 'APPRUNEOF'
          #!/bin/bash
          SELF="$(dirname "$(readlink -f "$0")")"
          exec "$SELF/usr/bin/hua-trans" "$@"
          APPRUNEOF
          chmod +x $APPDIR/AppRun

          # Download appimagetool
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

          # Build AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage $APPDIR Hua-Trans-x86_64.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hua-Trans-x86_64.AppImage
          path: Hua-Trans-x86_64.AppImage

  # ── Windows build ────────────────────────────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python deps
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller main.py `
            --name=hua-trans-windows `
            --onefile `
            --windowed `
            --add-data="core;core" `
            --add-data="gui;gui" `
            --add-data="resources;resources" `
            --hidden-import=PyQt5 `
            --hidden-import=PyQt5.QtWidgets `
            --hidden-import=PyQt5.QtCore `
            --hidden-import=PyQt5.QtGui `
            --hidden-import=PyQt5.QtSvg `
            --hidden-import=fitz `
            --hidden-import=pynput `
            --hidden-import=pyperclip `
            --hidden-import=PIL `
            --hidden-import=requests `
            --hidden-import=keyring `
            --noconfirm --clean

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: hua-trans-windows
          path: dist/hua-trans-windows.exe

  # ── GitHub Release (on tag only) ─────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Hua-Trans-x86_64.AppImage
      - uses: actions/download-artifact@v4
        with:
          name: hua-trans-windows

      - name: Set AppImage as executable
        run: chmod +x Hua-Trans-x86_64.AppImage

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Hua-Trans-x86_64.AppImage
            hua-trans-windows.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
